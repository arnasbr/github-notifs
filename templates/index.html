<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="dark">
  <title>gh-notify ({{ unread_count }})</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1c2128;
      --surface-3: #262c36;
      --border: #30363d;
      --border-hi: #484f58;
      --text: #e6edf3;
      --muted: #8b949e;
      --link: #58a6ff;
    }
    * { box-sizing: border-box; }
    html, body { background: var(--bg); }
    body {
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      max-width: 960px;
      margin: 0 auto;
      padding: 2em 1.5em 4em;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1em;
      margin-bottom: 1.25em;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.01em;
    }
    h1 .dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #3fb950;
      margin-right: 8px;
      vertical-align: middle;
      box-shadow: 0 0 8px #3fb95080;
    }
    nav { display: flex; gap: 6px; align-items: center; font-size: 13px; }
    nav a {
      color: var(--muted);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 6px;
    }
    nav a:hover { background: var(--surface); color: var(--text); }
    nav a.active { color: var(--text); background: var(--surface); }
    .list { display: flex; flex-direction: column; gap: 8px; }
    .item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color .12s ease, background .12s ease;
    }
    .item:hover { border-color: var(--border-hi); background: var(--surface-2); }
    .reason {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      padding: 4px 8px;
      border-radius: 4px;
      white-space: nowrap;
      background: #6e7681;
      color: #fff;
      min-width: 7em;
      text-align: center;
    }
    .reason.mention, .reason.team_mention { background: #da3633; }
    .reason.review_requested { background: #1f6feb; }
    .reason.assign { background: #8957e5; }
    .reason.author, .reason.comment { background: #238636; }
    .meta { flex: 1; min-width: 0; }
    .title { font-size: 14px; font-weight: 500; margin-bottom: 3px; overflow: hidden; text-overflow: ellipsis; }
    .title a { color: var(--link); text-decoration: none; }
    .title a:hover { text-decoration: underline; }
    .sub { font-size: 12px; color: var(--muted); display: flex; gap: .6em; align-items: center; }
    .sub .sep { opacity: .5; }
    .actions { display: flex; gap: 6px; flex: none; }
    button {
      font: inherit;
      font-size: 12px;
      color: var(--text);
      background: var(--surface-2);
      border: 1px solid var(--border);
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover { background: var(--surface-3); border-color: var(--border-hi); }
    form { display: inline; margin: 0; }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 4em 0;
      font-style: italic;
    }
    ::selection { background: #1f6feb55; }
  </style>
</head>
<body>
  <header>
    <h1><span class="dot"></span>gh-notify</h1>
    <nav>
      <a href="{{ url_for('index') }}" {% if view == 'unread' %}class="active"{% endif %}>unread ({{ unread_count }})</a>
      <a href="{{ url_for('read') }}" {% if view == 'read' %}class="active"{% endif %}>read</a>
      <button type="button" onclick="location.reload()" title="refresh now">refresh</button>
      {% if view == 'unread' and rows %}
        <form method="post" action="{{ url_for('mark_all_read') }}">
          <button>mark all read</button>
        </form>
      {% endif %}
    </nav>
  </header>

  <div class="list">
    {% for r in rows %}
      <div class="item">
        <span class="reason {{ r.reason }}">{{ r.reason.replace('_', ' ') }}</span>
        <div class="meta">
          <div class="title"><a href="{{ r.url }}" target="_blank" rel="noopener">{{ r.title }}</a></div>
          <div class="sub">
            <span>{{ r.repo }}</span>
            <span class="sep">·</span>
            <span>{{ r.updated_at|humantime }}</span>
          </div>
        </div>
        <div class="actions">
          <form method="post" action="{{ url_for('mark', state='read' if r.state == 'unread' else 'unread', nid=r.id) }}">
            <button>{% if r.state == 'unread' %}mark read{% else %}mark unread{% endif %}</button>
          </form>
        </div>
      </div>
    {% else %}
      <div class="empty">nothing here.</div>
    {% endfor %}
  </div>

  <script>
    const view = {{ view|tojson }};
    let sig = {{ sig|tojson }};
    setInterval(async () => {
      try {
        const r = await fetch(`/api/state?view=${view}`, { cache: "no-store" });
        if (!r.ok) return;
        const data = await r.json();
        if (data.sig && data.sig !== sig) location.reload();
      } catch {}
    }, 15000);
  </script>
</body>
</html>
